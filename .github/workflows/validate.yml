name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e ./plugins/douyin-content-capture/python-package

      - name: Run package tests
        run: pytest plugins/douyin-content-capture/python-package/tests

      - name: Validate JSON manifests
        run: |
          python -m json.tool plugins/douyin-content-capture/.codex-plugin/plugin.json > /dev/null
